<section class="bg-gradient-to-br from-cyan-100 to-white border rounded p-4 shadow w-[50%] mx-auto my-40">
  <h1 class="text-cyan-500 text-center text-3xl mb-4">
    CheckOut
  </h1>

  <form [formGroup]="checkoutFrom">

    <div class="mb-1">
      <label for="details" class="block mb-2 text-sm font-medium text-gray-900 text-dark">
        Details
      </label>
      <textarea
        formControlName="details"
        type="text"
        id="details"
        class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg
               focus:ring-cyan-500 focus:border-cyan-500 block w-full p-2.5 ">
      </textarea>
    </div>

    <div class="mb-1">
      <label for="phone" class="block mb-2 text-sm font-medium text-gray-900 text-dark">
        Phone
      </label>
      <input
        formControlName="phone"
        type="tel"
        id="phone"
        class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg
               focus:ring-cyan-500 focus:border-cyan-500 block w-full p-2.5">
    </div>

    <div class="mb-1">
      <label for="city" class="block mb-2 text-sm font-medium text-gray-900 text-dark">
        City
      </label>
      <input
        formControlName="city"
        type="text"
        id="city"
        class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg
               focus:ring-cyan-500 focus:border-cyan-500 block w-full p-2.5">
    </div>

    <button class="bg-cyan-500 hover:bg-cyan-400 px-6 py-1 text-white rounded-lg">
      Create Order
    </button>

  </form>
</section>
