<div class="max-w-3xl mx-auto p-6 mt-28">

<h2 class="text-2xl font-bold mb-6 text-gray-800">
Checkout
</h2>

<form 
[formGroup]="checkoutForm" 
(ngSubmit)="goToPayment()"
class="space-y-6 bg-white p-6 rounded-xl shadow-md"
>

<div>
<label class="block mb-2 text-sm font-medium text-gray-900">
Full Name
</label>

<input
type="text"
formControlName="userName"
placeholder="Enter your name"
class="bg-gray-50 border border-gray-300 rounded-lg w-full p-2.5"
/>
</div>

<div>
<label class="block mb-2 text-sm font-medium text-gray-900">
Address
</label>

<input
type="text"
formControlName="address"
placeholder="Enter your address"
class="bg-gray-50 border border-gray-300 rounded-lg w-full p-2.5"
/>
</div>

<div>
<label class="block mb-2 text-sm font-medium text-gray-900">
Order Notes
</label>

<textarea
rows="4"
formControlName="notes"
placeholder="Write notes for delivery..."
class="bg-gray-50 border border-gray-300 rounded-lg w-full p-2.5"
></textarea>
</div>

<button
type="submit"
class="w-full text-white bg-blue-600 hover:bg-blue-700 py-3 rounded-lg"
>
Continue to Payment
</button>

</form>

</div>
