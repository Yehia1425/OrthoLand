<section class="py-20 bg-cyan-100 mt-20">

<div class="max-w-7xl mx-auto grid gap-8 px-6 md:grid-cols-2 lg:grid-cols-3">

@for (pro of categories(); track pro.id) {

<div class="bg-white p-10 rounded-2xl text-center shadow-md hover:-translate-y-2 hover:shadow-xl transition cursor-pointer"
     [routerLink]="['/offers', pro.id]">

<h3 class="text-xl font-semibold mb-2">
{{ pro.name }}
</h3>

</div>

}

</div>

</section>
