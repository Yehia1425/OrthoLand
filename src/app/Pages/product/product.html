<section class="py-20 bg-cyan-100 mt-20">

<div class="max-w-7xl mx-auto px-4 mt-2">

<input
type="text"
placeholder="Search products..."
[formControl]="searchControl"
class="w-full p-3 border rounded-lg mb-8"
/>

</div>

<!-- VIDEO -->

@if(videoUrl()){

<section class="py-10 bg-white mb-10">

<div class="max-w-5xl mx-auto rounded-2xl overflow-hidden border-4 border-cyan-500 shadow-2xl aspect-video">

<video controls muted loop class="w-full h-full object-cover">

<source
[src]="getVideoUrl(videoUrl())"
type="video/mp4"
/>

</video>

</div>

</section>

}

<!-- PRODUCTS -->

<div class="max-w-7xl mx-auto grid gap-6 px-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">

@for (pro of filteredProducts(); track pro.id) {

<div class="bg-white rounded-xl shadow-sm hover:shadow-xl hover:-translate-y-1 transition duration-300 flex flex-col">

<!-- Image -->
<div class="h-48 bg-gray-100 rounded-t-xl overflow-hidden flex items-center justify-center">

@if (pro.picturesUrls && pro.picturesUrls.length) {

<img
[src]="getImageUrl(pro.picturesUrls[0])"
class="w-full h-full object-cover"
alt="product image"
/>

}

</div>

<!-- Content -->
<div class="p-4 flex flex-col flex-grow">

<p class="text-gray-400 text-sm truncate mb-1">
Category: {{ pro.categoryId }}
</p>

<h3 class="font-semibold text-lg truncate">
{{ pro.name }}
</h3>

<p class="text-sm text-gray-500">
Stock: {{ pro.stock }}
</p>

<p class="text-sm text-gray-500 mb-2">
Sold: {{ pro.soldNumber }}
</p>

<div class="flex items-center text-sm mb-3">

<span class="text-yellow-500 mr-1">⭐</span>

<span class="text-gray-700">
{{ pro.rate }}
</span>

</div>

<!-- Bottom -->
<div class="flex items-center justify-between mt-auto">

<span class="font-bold text-cyan-600 text-lg">
{{ pro.price }} EGP
</span>

<div class="flex gap-2">

<button
[routerLink]="['/product-details', pro.id]"
class="bg-gray-200 px-3 py-1 rounded hover:bg-gray-300 transition text-sm">

View

</button>

<button
(click)="addToCart(pro)"
class="bg-[#2D465E] text-white px-3 py-1 rounded hover:bg-[#1f3346] transition text-sm">

Add

</button>

</div>

</div>

</div>

</div>

}

</div>

</section>
