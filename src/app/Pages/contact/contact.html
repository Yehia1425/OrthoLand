<section class="min-h-screen bg-gray-200 flex flex-col items-center justify-center bg-gray-50 py-20 px-6 ">
  <div class="max-w-3xl w-full bg-white shadow-lg rounded-2xl p-10">
    <h2 class="text-3xl font-semibold text-center text-[#000] mb-6">
      Contact Us
    </h2>

    <p class="text-center mb-8">
      We'd love to hear from you! Please fill out the form below.
    </p>

    <form class="space-y-6">
      <div>
        <label class="block text-[#000] mb-2">Full Name</label>
        <input
          type="text"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#2D465E]"
          placeholder="Enter your name"
        />
      </div>

      <div>
        <label class="block text-[#000] mb-2">Email</label>
        <input
          type="email"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#2D465E]"
          placeholder="Enter your email"
        />
      </div>

      <div>
        <label class="block text-[#000] mb-2">Message</label>
        <textarea
          rows="5"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-[#2D465E]"
          placeholder="Write your message..."
        ></textarea>
      </div>

      <div class="text-center">
        <button
          type="button"
          class="bg-[#000] text-white px-8 py-3 rounded-lg hover:bg-[#6f4729] transition-all duration-300"
        >
          Send Message
        </button>
      </div>
    </form>
  </div>
</section>
