<section class="container max-w-full min-h-screen px-20 py-32 bg-[#F6F6F6]">

<div class="flex justify-between mb-10 items-center">

<h2 class="text-[#2D465E] text-[36px] font-semibold flex items-center gap-2">
🛒 Shop Cart
</h2>

<button
(click)="clearCart()"
class="py-3 px-6 bg-[#2D465E] text-white rounded-lg text-sm flex items-center gap-2 hover:bg-[#1f3346] transition">

<i class="pi pi-trash"></i>
Clear Cart

</button>

</div>

<div class="shadow-lg px-8 py-8 bg-white rounded-xl">

<div class="text-[26px] font-semibold mb-8 text-[#2D465E]">
Total Cart Price : {{ getTotalPrice() }} EGP
</div>

@for (item of cartItems(); track item.id) {

<div class="flex justify-between items-center gap-6 mb-6 border-b pb-6">

<!-- Product -->

<div class="flex items-center gap-5">

<div class="w-32 h-28 bg-gray-100 rounded-lg flex items-center justify-center overflow-hidden">

<img
[src]="getImageUrl(item.pictureUrl)"
class="w-full h-full object-cover"
[alt]="item.name"
/>

</div>

<div class="flex flex-col gap-2">

<h4 class="text-lg font-semibold text-[#2D465E]">
{{item.name}}
</h4>

<button
(click)="removeItem(item.id)"
class="text-red-500 text-sm hover:underline flex items-center gap-1">

<i class="fas fa-trash-can"></i>
Remove

</button>

</div>

</div>

<!-- Quantity -->

<div class="flex items-center gap-4 bg-gray-100 px-4 py-2 rounded-lg">

<button
(click)="increaseQuantity(item)"
class="text-xl text-[#2D465E] hover:scale-110 transition">

<i class="fa-regular fa-square-plus"></i>

</button>

<span class="text-lg font-semibold w-6 text-center">
{{item.quantity}}
</span>

<button
(click)="decreasequantity(item)"
class="text-xl text-[#2D465E] hover:scale-110 transition">

<i class="fa-regular fa-square-minus"></i>

</button>

</div>

<!-- Price -->

<div class="text-right">

<p class="text-gray-400 text-sm">
Price
</p>

<p class="text-xl font-bold text-[#2D465E]">
{{item.price}} EGP
</p>

<p class="text-sm text-gray-500">
Total : {{ getItemTotal(item) }} EGP
</p>

</div>

</div>

}

<div class="flex justify-end mt-10">

<button
routerLink="/checkout"
class="bg-[#2D465E] px-8 py-3 text-white rounded-lg hover:bg-[#1f3346] transition">

Proceed To Checkout

</button>

</div>

</div>

</section>
