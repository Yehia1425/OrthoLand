<section class="container max-w-full min-h-screen mt-14 bg-[#F6F6F6] px-6 md:px-20 py-20">
  <!-- Header -->
  <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-5">
    <h2 class="text-[#2d2d2d] text-4xl font-semibold">🛒 Shop Cart</h2>

    <button

      class="flex items-center gap-2 bg-[#2D465E] hover:bg-[#2b7ac4] text-white px-6 py-3 rounded-lg text-sm transition-all duration-300"
    >
      <i class="pi pi-trash"></i> Clear Cart
    </button>
  </div>

  <!-- Cart Body -->
  <div class="bg-white shadow-md rounded-xl p-6">
    <div class="text-2xl md:text-3xl font-semibold text-[#333] mb-6">
      Total Cart Price :
      <span class="text-[#2D465E]"> EGP</span>
    </div>

    <!-- Cart Items -->
 
    <div
      class="grid md:grid-cols-[1fr_250px] gap-6 border-b border-gray-200 py-5 last:border-none"
    >
      <!-- Product Info -->
      <div class="flex flex-col sm:flex-row gap-5">
        <div class="w-full sm:w-32 flex-shrink-0">
          <img
            src="/Images/home-slider.jpg"
            alt="prod.productName"
            class="w-full h-32 object-contain rounded-md"
          />
        </div>

        <div class="flex flex-col justify-between">
          <div>
            <h4 class="text-lg font-semibold text-[#2d2d2d]">
             productName 
            </h4>
          </div>

          <button
       
            class="text-[#2D465E] hover:text-[#2b7ac4] text-sm mt-2 flex items-center gap-1 transition-all"
          >
            <i class="fas fa-trash-can"></i> Remove
          </button>
        </div>
      </div>

      <!-- Quantity Controls -->
      <div class="flex items-center justify-end gap-4">
        <button
          
          class="text-2xl text-[#2D465E] hover:text-[#2b7ac4] transition"
        >
          <i class="fa-regular fa-square-plus"></i>
        </button>

        <span class="text-lg font-medium">quantity </span>

        <button
          
          class="text-2xl text-[#2D465E] hover:text-[#2b7ac4] transition"
        >
          <i class="fa-regular fa-square-minus"></i>
        </button>
      </div>
    </div>
    

    <!-- Checkout Button -->
    <div class="flex justify-end mt-10">
      <button routerLink="/checkout"
       
        class="bg-[#2D465E] hover:bg-[#2b7ac4] px-8 py-3 text-white rounded-lg text-lg transition-all"
      >
        Proceed to Payment
      </button>
    </div>
  </div>
</section>
