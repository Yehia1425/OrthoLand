<section class="container max-w-full min-h-screen px-28 py-40 bg-[#F6F6F6]">

<div class="flex justify-between mb-6 items-center px-24">

<h2 class="text-text-color text-[40px] flex items-center">
Shop Cart
</h2>

<button
(click)="clearCart()"
class="py-3 h-fit px-5 bg-[#2D465E] text-white duration-300 transition-colors rounded-md text-sm flex items-center">

Clear Cart
<i class="pi pi-trash ml-2"></i>

</button>

</div>

<div class="shadow-lg px-5 py-5 bg-white rounded-lg">

<div class="text-[30px] font-semibold mb-6">
Total Cart Price : {{ getTotalPrice() }} EGP
</div>

@for (item of cartItems(); track item.id) {

<div class="grid lg:grid-cols-[1fr_350px] gap-5 relative mb-6 border-b pb-5">

<div class="flex flex-col rounded-[10px] bg-white h-fit">

<div class="flex items-center gap-5 py-3 px-4">

<!-- Product Image -->

<div class="sm:w-40 max-w-32">

<img
[src]="getImageUrl(item.pictureUrl)"
class="w-full h-[100px] object-contain"
[alt]="item.name"
>

</div>

<!-- Product Info -->

<div class="flex justify-between items-center flex-col sm:flex-row gap-4 w-full">

<div class="flex flex-col gap-2">

<span class="text-gray-500 text-sm">
{{item.name}}
</span>

<h4 class="text-lg font-medium">
{{item.name}}
</h4>

<button
(click)="removeItem(item.id)"
class="text-[#2D465E] text-sm">

<i class="fas fa-trash-can mr-1"></i>
Remove

</button>

</div>

<!-- Quantity -->

<div class="flex items-center gap-3">

<button
(click)="increaseQuantity(item)"
class="text-3xl text-black">

<i class="fa-regular fa-square-plus"></i>

</button>

<span class="text-lg font-medium">
{{item.quantity}}
</span>

<button
(click)="decreasequantity(item)"
class="text-3xl text-black">

<i class="fa-regular fa-square-minus"></i>

</button>

</div>

</div>

</div>

</div>

</div>

}

<div class="flex justify-end mt-6">

<button
routerLink="/checkout"
class="bg-[#2D465E] px-6 py-3 text-center text-white rounded-lg">

CheckOut

</button>

</div>

</div>

</section>
