<section class="container mx-auto py-32 px-6 md:px-20">

@if(product(); as product){

<div class="grid grid-cols-1 lg:grid-cols-2 gap-12">

<!-- Images -->

<div class="w-full">

<!-- Main Image -->
<div class="w-full h-[300px] sm:h-[400px] md:h-[500px] bg-gray-100 rounded-xl overflow-hidden">

<img
[src]="getImageUrl(selectedImage())"
class="w-full h-full object-cover"
/>

</div>

<!-- Thumbnails -->

<div class="flex gap-3 mt-4 flex-wrap">

@for(img of product.picturesUrls; track img){

<div
(click)="changeImage(img)"
class="w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 border rounded-lg cursor-pointer hover:border-[#2D465E] overflow-hidden">

<img
[src]="getImageUrl(img)"
class="w-full h-full object-cover"
/>

</div>

}

</div>

</div>

<!-- Product Info -->

<div class="flex flex-col gap-6">

<h1 class="text-2xl md:text-3xl font-bold text-[#2D465E]">
{{product.name}}
</h1>

<p class="text-gray-600">
{{product.description}}
</p>

<div class="text-xl md:text-2xl font-bold text-[#2D465E]">
{{product.price}} EGP
</div>

<!-- Product Specifications -->

<div class="flex flex-col gap-2 text-gray-700">

@if(product.type){
<div class="flex gap-2">
<span class="font-semibold text-[#2D465E]">Type:</span>
<span>{{product.type}}</span>
</div>
}

@if(product.size){
<div class="flex gap-2">
<span class="font-semibold text-[#2D465E]">Size:</span>
<span>{{product.size}}</span>
</div>
}

@if(product.color){
<div class="flex gap-2">
<span class="font-semibold text-[#2D465E]">Color:</span>
<span>{{product.color}}</span>
</div>
}

</div>

<!-- Quantity -->

<div class="flex items-center gap-5">

<button
(click)="decrease()"
class="bg-gray-200 px-4 py-2 rounded">

-

</button>

<span class="text-xl font-semibold">
{{quantity()}}
</span>

<button
(click)="increase()"
class="bg-gray-200 px-4 py-2 rounded">

+

</button>

</div>

<!-- Add To Cart -->

<button
(click)="addToCart(product)"
class="bg-[#2D465E] text-white px-8 py-3 rounded-lg w-fit hover:bg-[#1f3346] transition">

Add To Cart

</button>

</div>

</div>

}

</section>
