<section class="container mx-auto py-32 px-20">

@if(product(); as product){

<div class="grid grid-cols-2 gap-16">

<!-- Images -->

<div>

<!-- Main Image -->
<div class="bg-gray-100 rounded-xl overflow-hidden w-full h-[450px] mb-6">

<img
[src]="getImageUrl(selectedImage())"
class="w-full h-full object-cover"
/>

</div>

<!-- Thumbnails -->

<div class="flex gap-4 flex-wrap">

@for(img of product.picturesUrls; track img){

<div
(click)="changeImage(img)"
class="w-24 h-24 border rounded-lg cursor-pointer hover:border-[#2D465E] overflow-hidden bg-white">

<img
[src]="getImageUrl(img)"
class="w-full h-full object-cover"
/>

</div>

}

</div>

</div>

<!-- Product Info -->

<div class="flex flex-col gap-6">

<h1 class="text-3xl font-bold text-[#2D465E]">
{{product.name}}
</h1>

<p class="text-gray-600">
{{product.description}}
</p>

<div class="text-2xl font-bold text-[#2D465E]">
{{product.price}} EGP
</div>

<!-- Quantity -->

<div class="flex items-center gap-5">

<button
(click)="decrease()"
class="bg-gray-200 px-4 py-2 rounded">

-

</button>

<span class="text-xl font-semibold">
{{quantity()}}
</span>

<button
(click)="increase()"
class="bg-gray-200 px-4 py-2 rounded">

+

</button>

</div>

<!-- Add To Cart -->

<button
(click)="addToCart(product)"
class="bg-[#2D465E] text-white px-8 py-3 rounded-lg w-fit">

Add To Cart

</button>

</div>

</div>

}

</section>
