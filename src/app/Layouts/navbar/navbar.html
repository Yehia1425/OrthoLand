<!-- Navbar -->
<header
class="fixed top-0 inset-x-0 z-50 transition-all duration-300"
[class.bg-transparent]="!isScrolling"
[class.bg-cyan-400]="isScrolling"
[class.shadow-lg]="isScrolling"
>

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<!-- Logo -->
<img src="Images/Logo.png" class="h-14" alt="Logo" />

<!-- Desktop Menu -->
<nav
class="hidden md:flex items-center gap-8 font-medium text-white"
>

<a routerLink="/home" class="hover:text-cyan-100">
الرئيسية
</a>

<a routerLink="/categories" class="hover:text-cyan-100">
الاقسام
</a>

<a routerLink="/categories-offers" class="hover:text-cyan-100">
العروض
</a>

<a routerLink="/contact" class="hover:text-cyan-100">
تواصل معنا
</a>

<a routerLink="/cart" class="flex items-center gap-2 relative">
<i class="fas fa-shopping-cart"></i>
</a>

</nav>

<!-- Mobile Button -->
<button
(click)="toggleMenu()"
class="md:hidden text-white text-2xl"
>
<i class="fas fa-bars"></i>
</button>

</div>
</header>
